services:
  - type: web
    name: bejaa-pet-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: WA_INSTANCE
        sync: false
      - key: WA_TOKEN
        sync: false
